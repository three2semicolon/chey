<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheyenne Simone Photography</title>
  <link rel="icon" type="image/png" href="public/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/nav.css">
</head>

<div id="lightbox" aria-modal="true" role="dialog">
  <div class="lightbox-backdrop"></div>
  <div class="lightbox-inner">
    <button class="lightbox-close" aria-label="Close">&#215;</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Previous">&#8592;</button>
    <button class="lightbox-nav lightbox-next" aria-label="Next">&#8594;</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" src="" alt="">
    </div>
    <div class="lightbox-info">
      <p class="lightbox-category eyebrow"></p>
      <h3 class="lightbox-title"></h3>
      <div class="divider"></div>
      <p class="lightbox-desc"></p>
    </div>
  </div>
</div>

<body>
  <nav id="site-nav">
    <ul class="nav-links nav-links-left">
      <li><a href="src/pages/contact.html" data-page="contact">Contact</a></li>
      <li><a href="src/pages/booking.html" data-page="booking">Booking</a></li>
    </ul>

    <a class="nav-logo" href="src/pages/home.html" data-page="home">
      <div class="nav-logo-rings">
        <div class="nav-ring nav-ring-1"></div>
        <div class="nav-ring nav-ring-2"></div>
        <div class="nav-ring nav-ring-3"></div>
        <div class="nav-ring nav-ring-4"></div>
      </div>
      <img src="public/img/logo.png" alt="Cheyenne Simone Photography"
          onerror="this.style.display='none'">
      <span class="nav-title">Cheyenne Simone<br>Photography</span>
    </a>

    <ul class="nav-links nav-links-right">
      <li><a href="src/pages/socials.html" data-page="socials">Socials</a></li>
      <li><a href="src/pages/portfolio.html" data-page="portfolio">Portfolio</a></li>
    </ul>

    <button id="hamburger-menu" class="hamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-menu-mobile">
      <ul class="nav-links-mobile">
        <li><a href="src/pages/contact.html" data-page="contact">Contact</a></li>
        <li><a href="src/pages/booking.html" data-page="booking">Booking</a></li>
        <li><a href="src/pages/socials.html" data-page="socials">Socials</a></li>
        <li><a href="src/pages/portfolio.html" data-page="portfolio">Portfolio</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content" style="padding-top: var(--nav-h)">
    <!-- router loads page content here -->
  </main>

  <script>
    const nav = document.getElementById('site-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });
  </script>
  <script src="src/js/nav.js"></script>
  <script type="module" src="src/js/router.js"></script>
  <script type="module" src="src/js/pages/home.js"></script>
</body>
</html>
