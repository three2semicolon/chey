<div class="portfolio-page">

  <div class="portfolio-header">
    <div class="portfolio-header-left">
      <p class="eyebrow">Work</p>
      <h1>Portfolio</h1>
    </div>
    <div class="portfolio-filters" id="portfolio-filters">
      <!-- injected by portfolio.js -->
    </div>
  </div>

  <!-- Featured strip -->
  <div class="featured-strip" id="featured-strip" style="display:none">
    <p class="eyebrow">Featured</p>
    <div class="featured-grid" id="featured-grid"></div>
  </div>

  <!-- Main gallery -->
  <div class="gallery-grid" id="gallery-grid">
    <div class="gallery-loading">
      <span>Loading</span>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div id="lightbox" aria-modal="true" role="dialog">
  <div class="lightbox-backdrop"></div>
  <div class="lightbox-inner">
    <button class="lightbox-close" aria-label="Close">&#215;</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Previous">&#8592;</button>
    <button class="lightbox-nav lightbox-next" aria-label="Next">&#8594;</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" src="" alt="">
    </div>
    <div class="lightbox-info">
      <p class="lightbox-category eyebrow"></p>
      <h3 class="lightbox-title"></h3>
      <div class="divider"></div>
      <p class="lightbox-desc"></p>
    </div>
  </div>
</div>
