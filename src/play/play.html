<div class="play-page">

  <div class="play-canvas-wrap">
    <canvas id="play-canvas"></canvas>

    <div class="play-loading" id="play-loading">
      <span>Loading</span>
    </div>

    <!-- Floating HUD -->
    <div class="play-hud">
      <a href="#" data-page="home" class="play-hud-btn play-back" aria-label="Back to site">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>

      <p class="play-hint">Swipe to throw</p>

      <button class="play-hud-btn play-reset" id="play-reset-btn" aria-label="Reset ball">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
  </div>

</div>
